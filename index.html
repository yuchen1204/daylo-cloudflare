
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/ios/180.png">
    <link rel="manifest" href="/manifest.json">
    <title>Markdown Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5YCBER1viVgf0sa5VJHFa4s2DsT+a8V0dQg6P4VNmTMBQBbVD4RZ" crossorigin="anonymous">
    <style>
      body {
        font-family: var(--font-sans);
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-primary);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Markdown Preview Styles */
      .markdown-preview h1 { font-size: 2.25em; font-weight: 700; line-height: 1.3; margin: 1.5em 0 0.75em; color: var(--text-primary); }
      .markdown-preview h2 { font-size: 1.75em; font-weight: 600; line-height: 1.35; margin: 1.4em 0 0.6em; color: var(--text-primary); }
      .markdown-preview h3 { font-size: 1.375em; font-weight: 600; line-height: 1.4; margin: 1.3em 0 0.5em; color: var(--text-primary); }
      .markdown-preview h4 { font-size: 1.125em; font-weight: 600; line-height: 1.4; margin: 1.2em 0 0.4em; color: var(--text-primary); }
      .markdown-preview h5 { font-size: 1em; font-weight: 500; line-height: 1.5; margin: 1.1em 0 0.3em; color: var(--text-primary); }
      .markdown-preview h6 { font-size: 0.875em; font-weight: 500; line-height: 1.5; margin: 1em 0 0.3em; color: var(--text-primary); }
      .markdown-preview p { font-size: 1em; line-height: 1.7; margin: 1em 0; color: var(--text-primary); }
      .markdown-preview strong { font-weight: 600; color: var(--text-primary); }
      .markdown-preview em { font-style: italic; color: var(--text-primary); }
      .markdown-preview a { color: var(--text-secondary); text-decoration: underline; }
      .markdown-preview a:hover { color: var(--text-primary); }
      .markdown-preview blockquote {
        margin: 1.5em 0;
        padding: 1em 1.25em;
        border-radius: 8px;
        background: var(--bg-secondary);
        border-left: 3px solid var(--text-muted);
        font-style: italic;
        color: var(--text-secondary);
        box-shadow: var(--shadow-sm);
      }
      .markdown-preview code {
        padding: 0.15em 0.4em;
        border-radius: 4px;
        background: var(--bg-tertiary);
        font-family: var(--font-mono);
        font-size: 0.9em;
        color: var(--text-primary);
      }
      .markdown-preview pre {
        margin: 1.5em 0;
        padding: 0;
        border-radius: 8px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        box-shadow: var(--shadow-md);
        overflow: hidden;
      }
      .markdown-preview pre code {
        display: block;
        padding: 1em 1.25em;
        background: transparent;
        border-radius: 0;
      }
      .markdown-preview table {
        width: 100%;
        margin: 1.5em 0;
        border-collapse: collapse;
        border: 1px solid var(--border-primary);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .markdown-preview th {
        padding: 0.75em 1em;
        background: var(--bg-secondary);
        font-weight: 600;
        text-align: left;
        border-bottom: 2px solid var(--border-primary);
        color: var(--text-primary);
      }
      .markdown-preview td {
        padding: 0.75em 1em;
        border-bottom: 1px solid var(--border-subtle);
        color: var(--text-primary);
      }
      .markdown-preview tr:last-child td { border-bottom: none; }
      .markdown-preview hr {
        margin: 2em 0;
        border: none;
        border-top: 1px solid var(--border-primary);
      }
      .markdown-preview ul, .markdown-preview ol {
        margin: 1em 0;
        padding-left: 1.5em;
        line-height: 1.7;
        color: var(--text-primary);
      }
      .markdown-preview li { margin: 0.25em 0; }
      .markdown-preview img {
        max-width: 100%;
        border-radius: 8px;
        box-shadow: var(--shadow-sm);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "remark-gfm": "https://esm.sh/remark-gfm@4?bundle",
    "diff": "https://esm.sh/diff@5.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="overflow-hidden fixed inset-0 w-full h-full transition-colors duration-200" style="background: var(--bg-primary); color: var(--text-primary);">
    <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered: ', registration);
          })
          .catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
