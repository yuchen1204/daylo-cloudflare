
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/ios/180.png">
    <link rel="manifest" href="/manifest.json">
    <title>Markdown Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Markdown Preview Styles */
      .markdown-preview h1 { font-size: 2em; font-weight: 700; margin-bottom: 0.5em; margin-top: 1em; color: #1e293b; }
      .markdown-preview h2 { font-size: 1.5em; font-weight: 600; margin-bottom: 0.5em; margin-top: 1em; color: #334155; }
      .markdown-preview h3 { font-size: 1.25em; font-weight: 600; margin-bottom: 0.5em; margin-top: 1em; color: #475569; }
      .markdown-preview p { margin-bottom: 1em; line-height: 1.7; color: #475569; }
      .markdown-preview ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-preview ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
      .markdown-preview blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; font-style: italic; color: #64748b; margin-bottom: 1em; }
      .markdown-preview code { background-color: #f1f5f9; padding: 0.2em 0.4em; border-radius: 0.25em; font-family: monospace; font-size: 0.9em; }
      .markdown-preview pre { background-color: #f1f5f9; padding: 1em; border-radius: 0.5em; overflow-x: auto; margin-bottom: 1em; }
      .markdown-preview pre code { background-color: transparent; padding: 0; }
      .markdown-preview a { color: #4f46e5; text-decoration: underline; }
      .markdown-preview hr { border-color: #e2e8f0; margin: 2em 0; }

      /* Table Styles */
      .markdown-preview table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; }
      .markdown-preview th, .markdown-preview td { border: 1px solid #cbd5e1; padding: 0.75em; text-align: left; }
      .markdown-preview th { background-color: #f8fafc; font-weight: 600; color: #334155; }
      .markdown-preview tr:nth-child(even) { background-color: #fcfcfc; }

      /* Dark Mode Markdown Overrides */
      .dark .markdown-preview h1 { color: #f1f5f9; }
      .dark .markdown-preview h2 { color: #e2e8f0; }
      .dark .markdown-preview h3 { color: #cbd5e1; }
      .dark .markdown-preview p { color: #cbd5e1; }
      .dark .markdown-preview blockquote { border-left-color: #475569; color: #94a3b8; }
      .dark .markdown-preview code { background-color: #1e293b; color: #e2e8f0; }
      .dark .markdown-preview pre { background-color: #1e293b; }
      .dark .markdown-preview a { color: #818cf8; }
      .dark .markdown-preview hr { border-color: #334155; }
      .dark .markdown-preview li { color: #cbd5e1; }
      
      /* Dark Mode Table Overrides */
      .dark .markdown-preview th, .dark .markdown-preview td { border-color: #334155; color: #cbd5e1; }
      .dark .markdown-preview th { background-color: #1e293b; color: #f1f5f9; }
      .dark .markdown-preview tr:nth-child(even) { background-color: #0f172a; }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "remark-gfm": "https://esm.sh/remark-gfm@4?bundle",
    "diff": "https://esm.sh/diff@5.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-hidden fixed inset-0 w-full h-full transition-colors duration-200">
    <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered: ', registration);
          })
          .catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
